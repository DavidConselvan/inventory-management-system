# Render Blueprint — one-click deploy of the whole stack.
# Deploy: push to GitHub, then "New + > Blueprint" on Render and pick this repo.
# After the first deploy, set the two `sync: false` vars (the cross-service URLs)
# in the dashboard, then redeploy.
databases:
  - name: inventory-db
    databaseName: inventory
    user: inventory
    plan: free

services:
  # ---- Django REST API (Docker) ----------------------------------------
  - type: web
    name: inventory-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: sh ./entrypoint.sh
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false # set to the frontend URL, e.g. https://inventory-frontend.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false # optional — set to enable the JP AI assistant
      - key: ASSISTANT_MODEL
        value: claude-opus-4-8
      - key: POSTGRES_DB
        fromDatabase:
          name: inventory-db
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: inventory-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: inventory-db
          property: password
      - key: POSTGRES_HOST
        fromDatabase:
          name: inventory-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: inventory-db
          property: port

  # ---- React SPA (static) ----------------------------------------------
  - type: web
    name: inventory-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # set to the backend URL + /api, e.g. https://inventory-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
